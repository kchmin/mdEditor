<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>샘플 HTML</title>
<style>
  body { font-family: sans-serif; }
  h1 { color: #2c5aa0; }
  .card { border: 1px solid #ccc; border-radius: 8px; padding: 16px; margin: 12px 0; }
</style>
</head>
<body>
  <h1>샘플 HTML 문서</h1>
  <p>이 문단을 클릭하면 직접 편집할 수 있습니다.</p>
  <div class="card">
    <h2>카드 제목</h2>
    <p>카드 내용입니다.</p>
  </div>
  <ul>
    <li>목록 항목 1</li>
    <li>목록 항목 2</li>
  </ul>
</body>
</html>
